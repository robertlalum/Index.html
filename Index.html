<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TubeScribe — YouTube Transcript Downloader</title>
<meta name="description" content="Download YouTube transcripts as TXT, SRT, or VTT. Free, no sign-up.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0b0a;color:#e8e4df;font-family:system-ui,sans-serif;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:40px 16px}
h1{text-align:center;font-size:28px;font-weight:700;margin-bottom:4px}
.sub{text-align:center;font-size:13px;color:#6b6560;margin-bottom:28px}
.tabs{display:flex;gap:4px;background:#161514;border-radius:10px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;border:none;cursor:pointer;color:#6b6560;background:transparent;transition:all .2s}
.tab.on{background:#e09145;color:#0c0b0a}

  .row{display:flex;gap:8px;margin-bottom:8px}
.inp{flex:1;background:#161514;border:1px solid #2a2826;color:#e8e4df;padding:12px 12px 12px 36px;border-radius:10px;font-size:14px;outline:none}
.inp:focus{border-color:#e09145}
.wrap-inp{position:relative;flex:1}
.ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#4a4540;font-size:14px}
.btn{background:#e09145;color:#0c0b0a;border:none;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn:hover{background:#f0a860}
.btn:disabled{opacity:.4;cursor:not-allowed}
.st{display:none;align-items:center;gap:8px;font-size:13px;color:#6b6560;margin-bottom:12px}
.sp{border:2px solid #2a2826;border-top-color:#e09145;border-radius:50%;width:16px;height:16px;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

  .card{background:#161514;border:1px solid #2a2826;border-radius:14px;padding:14px;margin-bottom:10px;animation:fi .4s ease}
.ctop{display:flex;gap:10px;margin-bottom:10px}
.cimg{width:96px;height:54px;object-fit:cover;border-radius:8px;background:#1e1c1a}
.cinfo{min-width:0;flex:1}
.ctit{font-weight:600;font-size:13px;color:#e8e4df;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cw{font-size:11px;color:#6b6560;margin-top:3px}
.tbox{background:#0c0b0a;border:1px solid #2a2826;border-radius:8px;padding:10px;font-size:11px;line-height:1.5;color:#9a9188;white-space:pre-wrap;font-family:monospace;max-height:220px;overflow-y:auto;margin-bottom:10px}
.btns{display:flex;flex-wrap:wrap;gap:5px}
.sm{background:transparent;border:1px solid #2a2826;color:#9a9188;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s}
.sm:hover{background:#1e1c1a;color:#e09145;border-color:#3a3836}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

 .toast{position:fixed;bottom:16px;right:16px;padding:10px 14px;border-radius:10px;font-size:13px;color:#e8e4df;background:#161514;border:1px solid #dc2626;box-shadow:0 8px 20px rgba(0,0,0,.5);animation:fi .2s ease;z-index:50}
.toast.ok{border-color:#059669}
.ch{display:none}
.vrow{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:background .15s}
.vrow:hover{background:rgba(30,28,26,.7)}
.vrow.ck{background:rgba(224,145,69,.05)}
.ckb{appearance:none;width:16px;height:16px;border:2px solid #2a2826;border-radius:4px;cursor:pointer;flex-shrink:0;position:relative;background:transparent}
.ckb:checked{background:#e09145;border-color:#e09145}
.ckb:checked::after{content:'';position:absolute;left:3px;top:0;width:5px;height:9px;border:solid #0c0b0a;border-width:0 2px 2px 0;transform:rotate(45deg)}
.pbar{height:4px;background:#2a2826;border-radius:2px;overflow:hidden}
.pfill{height:100%;background:#e09145;border-radius:2px;transition:width .3s}
</style>

  </head>
<body>
<div class="wrap">
<h1>Tube<span style="color:#e09145">Scribe</span></h1>
<p class="sub">Paste a YouTube link. Download the transcript.</p>
<div class="tabs">
<button class="tab on" onclick="setTab('s')" id="t1">Single Video</button>
<button class="tab" onclick="setTab('c')" id="t2">Channel</button>
</div>
<div id="ps">
<div class="row">
<div class="wrap-inp">
<span class="ico">&#9654;</span 
<input type="url" id="url1" class="inp" placeholder="https://www.youtube.com/watch?v=...">
</div>
<button id="b1" class="btn" onclick="go1()">Extract</button>
</div>
<div class="st" id="st1"><div class="sp"></div><span id="sx1"></span></div>
</div>

 <div id="pc" class="ch">
<div class="row">
<div class="wrap-inp">
<span class="ico">@</span>
<input type="url" id="url2" class="inp" placeholder="https://www.youtube.com/@channel">
</div>
<button id="b2" class="btn" onclick="loadCh()">Load</button>
</div>
<div class="st" id="st2"><div class="sp"></div><span id="sx2"></span></div>
<div id="chHead" class="card ch"></div>
<div id="chBar" class="ch" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#9a9188;cursor:pointer"><input type="checkbox" class="ckb" id="selAll" onchange="togAll()"><span id="selN">0 selected</span></label>
<div style="display:flex;gap:6px">
<button id="moreBtn" class="sm ch" onclick="loadMore()">More</button>
<button id="extBtn" class="btn" style="padding:6px 14px;font-size:12px" onclick="extSel()">Extract Selected</button>
</div>
</div>
<div id="chVids" class="ch" style="max-height:400px;overflow-y:auto;background:#161514;border:1px solid #2a2826;border-radius:10px;margin-bottom:8px"></div> 

   <div id="chProg" class="card ch">
<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span id="prL" style="font-size:12px;color:#e8e4df"></span><button class="sm" onclick="cancelExt()">Cancel</button></div>
<div class="pbar"><div id="prF" class="pfill" style="width:0"></div></div>
<div id="prC" style="font-size:11px;color:#6b6560;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
</div>
<div id="chEmpty" class="ch" style="text-align:center;padding:48px 0;color:#4a4540;font-size:13px">Paste a channel URL to load videos</div>
</div>
<div id="out"></div>
</div>

<script>
var OUT=[];
var INST=['https://inv.nadeko.net','https://invidious.fdn.fr','https://vid.puffyan.us','https://invidious.nerdvpn.de','https://invidious.jing.rocks','https://iv.ggtyler.dev','https://yewtu.be'];
var cached=null;
function to(ms){var c=new AbortController();setTimeout(function(){c.abort();},ms);return c.signal;}
function setTab(t){
document.getElementById('t1').className='tab'+(t==='s'?' on':'');
document.getElementById('t2').className='tab'+(t==='c'?' on':'');
document.getElementById('ps').className=t==='s'?'':'ch';
document.getElementById('pc').className=t==='c'?'':'ch';
}

 async function aj(path){
var tried=new Set();
if(cached){tried.add(cached);try{var r=await fetch(cached+path,{signal:to(12000)});if(r.ok){var d=await r.json();return{d:d,i:cached};}}catch(e){cached=null;}}
for(var x=0;x<INST.length;x++){var inst=INST[x];if(tried.has(inst))continue;tried.add(inst);try{var r=await fetch(inst+path,{signal:to(12000)});if(r.ok){cached=inst;var d=await r.json();return{d:d,i:inst};}}catch(e){}}
throw new Error('fail');
}
async function at(url){var r=await fetch(url,{signal:to(15000)});if(!r.ok)throw new Error('fail');return r.text();}

 function vid(u){var m=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;}
function pv(raw){var ls=raw.split('\n'),cs=[],c=null,h=true;for(var x=0;x<ls.length;x++){var l=ls[x];if(h){if(l.indexOf('-->')!==-1)h=false;else continue;}if(l.indexOf('-->')!==-1){if(c&&c.t.trim())cs.push(c);c={time:l.trim(),t:''};}else if(c!==null){var y=l.replace(/<[^>]*>/g,'').trim();if(!y){if(c.t.trim())cs.push(c);c=null;}else c.t+=(c.t?' ':'')+y;}}if(c&&c.t.trim())cs.push(c);return cs;}
function gt(c){return c.map(function(x){return x.t;}).join('\n');}
function gs(c){return c.map(function(x,i){return(i+1)+'\n'+x.time.replace(/\./g,',')+'\n'+x.t;}).join('\n\n');}
function gv(c){return 'WEBVTT\n\n'+c.map(function(x){return x.time+'\n'+x.t;}).join('\n\n');} 


  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function wc(t){return t.split(/\s+/).filter(Boolean).length;}
function safe(s){return s.replace(/[<>:"/\\|?*]/g,'').substring(0,100);}
function fmtNum(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n);}
function fmtDur(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return h>0?h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'):m+':'+String(sec).padStart(2,'0');}
function toast(m,ok){var el=document.createElement('div');el.className='toast'+(ok?' ok':'');el.textContent=m;document.body.appendChild(el);setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(function(){el.remove();},300);},3000);}

  async function go1(){
var inp=document.getElementById('url1'),btn=document.getElementById('b1'),u=inp.value.trim();
if(!u){toast('Paste a YouTube URL',false);return;}
var id=vid(u);if(!id){toast('Not a valid YouTube URL',false);return;}
if(OUT.find(function(o){return o.id===id;})){toast('Already extracted',false);return;}
btn.disabled=true;btn.textContent='...';
var st=document.getElementById('st1'),sx=document.getElementById('sx1');
st.style.display='flex';sx.textContent='Fetching video...';

    try{
var r1=await aj('/api/v1/videos/'+id);
var v=r1.d,inst=r1.i,title=v.title||'Untitled';
var th=(v.videoThumbnails||[]);th=th.find(function(t){return t.quality==='medium';});if(!th&&v.videoThumbnails)th=v.videoThumbnails[0];th=th?th.url:'';
sx.textContent='Finding captions...';
var r2=await aj('/api/v1/captions/'+id);
var tracks=(r2.d.captions||[]).map(function(c){return{label:c.label,url:c.url.indexOf('http')===0?c.url:inst+c.url};});
if(!tracks.length)throw new Error('no');
tracks.sort(function(a,b){return(/auto/i.test(a.label)?1:0)-(/auto/i.test(b.label)?1:0);});
sx.textContent='Downloading transcript...';
var raw=await at(tracks[0].url),cues=pv(raw);
if(!cues.length)throw new Error('empty');

function render(o){
var el=document.createElement('div');el.className='card';
el.innerHTML='<div class="ctop"><img src="'+esc(o.thumb)+'" class="cimg" onerror="this.style.display=\'none\'"><div class="cinfo"><div class="ctit">'+esc(o.title)+'</div><div class="cw">'+o.words+' words</div></div></div><div class="tbox">'+esc(gt(o.cues))+'</div><div class="btns" id="b-'+o.id+'"></div>';
document.getElementById('out').prepend(el);
var bb=document.getElementById('b-'+o.id);
[['.TXT',gt],['.SRT',gs],['.VTT',gv]].forEach(function(pair){
var b=document.createElement('button');b.className='sm';b.textContent=pair[0];
b.onclick=function(){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([pair[1](o.cues)],{type:'text/plain'}));a.download=safe(o.title)+pair[0];a.click();};
bb.appendChild(b);
});

var cb=document.createElement('button');cb.className='sm';cb.textContent='Copy';
cb.onclick=function(){navigator.clipboard.writeText(gt(o.cues)).then(function(){toast('Copied',true);}).catch(function(){toast('Copy failed',false);});};
bb.appendChild(cb);
}

var CH={info:null,ucid:null,inst:null,vids:[],sel:new Set(),page:1,more:true,loading:false,exting:false,abort:null};

async function loadCh(){
var inp=document.getElementById('url2'),btn=document.getElementById('b2'),u=inp.value.trim();
if(!u){toast('Paste a channel URL',false);return;}
if(CH.loading)return;
CH.info=null;CH.ucid=null;CH.vids=[];CH.sel.clear();CH.page=1;CH.more=true;
['chHead','chBar','chVids','chProg'].forEach(function(id){document.getElementById(id).className='card ch';});
document.getElementById('chEmpty').className='ch';
btn.disabled=true;btn.textContent='...';
var st=document.getElementById('st2'),sx=document.getElementById('sx2');
st.style.display='flex';sx.textContent='Resolving channel...';

try{
var ucid=null,author=null,inst=null;
try{var r=await aj('/api/v1/resolveurl?url='+encodeURIComponent(u));if(r.d.ucid){ucid=r.d.ucid;author=r.d.author;inst=r.i;}}catch(e){}
if(!ucid){var hm=u.match(/youtube\.com\/@([\w.-]+)/);if(hm){try{var r=await aj('/api/v1/channels/@'+hm[1]);ucid=r.d.authorId;author=r.d.author;inst=r.i;}catch(e){}}}
if(!ucid){var im=u.match(/youtube\.com\/channel\/(UC[\w-]+)/);if(im){try{var r=await aj('/api/v1/channels/'+im[1]);ucid=r.d.authorId;author=r.d.author;inst=r.i;}catch(e){}}}
if(!ucid)throw new Error('not');
CH.ucid=ucid;CH.inst=inst;
sx.textContent='Loading channel info...';
var r=await aj('/api/v1/channels/'+ucid);CH.info=r.d;
var av=(r.d.authorThumbnails||[]);av=av.find(function(t){return t.width>=96;});av=av?av.url:'';

document.getElementById('chHead').innerHTML='<div style="display:flex;align-items:center;gap:12px"><img src="'+esc(av.indexOf('http')===0?av:inst+av)+'" style="width:48px;height:48px;border-radius:50%;background:#1e1c1a;object-fit:cover"><div><div style="font-weight:600;font-size:14px">'+esc(r.d.author||author||'Channel')+'</div><div style="font-size:11px;color:#6b6560;margin-top:2px">'+(r.d.subCount!=null?fmtNum(r.d.subCount)+' subs':'')+(r.d.videoCount!=null?' &middot; '+fmtNum(r.d.videoCount)+' videos':'')+'</div></div></div>';
document.getElementById('chHead').className='card';
sx.textContent='Loading videos...';
await fetchVids();
}catch(e){
toast(e.message==='not'?'Could not find that channel.':'Failed to load channel.',false);
document.getElementById('chEmpty').className='';
}finally{
btn.disabled=false;btn.textContent='Load';
st.style.display='none';
}
}

async function fetchVids(){
var r=await aj('/api/v1/channels/'+CH.ucid+'/videos?page='+CH.page+'&sort_by=newest');
var vids=r.d.videos||[];if(!vids.length){CH.more=false;return;}
CH.vids=CH.vids.concat(vids);if(CH.vids.length>=300||vids.length<30)CH.more=false;CH.page++;
renderVids();
document.getElementById('chBar').style.display='flex';
document.getElementById('chVids').className='';
document.getElementById('moreBtn').className=CH.more?'sm':'sm ch';
updSel();
}
async function loadMore(){
if(CH.loading||!CH.more)return;CH.loading=true;
var b=document.getElementById('moreBtn');b.disabled=true;b.textContent='...';
try{await fetchVids();}catch(e){toast('Failed to load more',false);}
finally{CH.loading=false;b.disabled=false;b.textContent='More';}
}

function renderVids(){
var el=document.getElementById('chVids');
el.innerHTML=CH.vids.map(function(v){
var th=(v.videoThumbnails||[]);th=th.find(function(t){return t.quality==='medium';});if(!th&&v.videoThumbnails)th=v.videoThumbnails[4]||v.videoThumbnails[0];th=th?th.url:'';
var sel=CH.sel.has(v.videoId),done=OUT.find(function(o){return o.id===v.videoId;});
return '<label class="vrow'+(sel?' ck':'')+'" data-v="'+v.videoId+'"><input type="checkbox" class="ckb" '+(sel?'checked':'')+' onchange="togVid(\''+v.videoId+'\',this.checked)"><img src="'+esc(th)+'" style="width:64px;height:36px;object-fit:cover;border-radius:6px;background:#1e1c1a" onerror="this.style.display=\'none\'"><div style="min-width:0;flex:1"><div style="font-size:12px;color:#e8e4df;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(v.title)+'</div><div style="font-size:10px;color:#6b6560">'+fmtDur(v.lengthSeconds||0)+(done?' &middot; <span style="color:#059669">Done</span>':'')+'</div></div></label>';
}).join('');
}

function togVid(id,ck){if(ck)CH.sel.add(id);else CH.sel.delete(id);var r=document.querySelector('[data-v="'+id+'"]');if(r)r.className='vrow'+(ck?' ck':'');updSel();}
function togAll(){var a=document.getElementById('selAll').checked;CH.vids.forEach(function(v){if(a)CH.sel.add(v.videoId);else CH.sel.delete(v.videoId);});renderVids();updSel();}
function updSel(){document.getElementById('selN').textContent=CH.sel.size+' of '+CH.vids.length+' selected';var a=document.getElementById('selAll');if(a)a.checked=CH.vids.length>0&&CH.sel.size===CH.vids.length;}


async function extSel(){
var selVids=CH.vids.filter(function(v){return CH.sel.has(v.videoId);});
if(!selVids.length){toast('Select videos first',false);return;}
CH.exting=true;CH.abort=new AbortController();
document.getElementById('extBtn').disabled=true;
document.getElementById('chProg').className='card';
var ok=0,fail=0,skip=0;
for(var x=0;x<selVids.length;x++){
if(CH.abort.signal.aborted)break;
var v=selVids[x],pct=Math.round((x/selVids.length)*100);
document.getElementById('prF').style.width=pct+'%';
document.getElementById('prL').textContent='Extracting '+(x+1)+' of '+selVids.length;
document.getElementById('prC').textContent=v.title;
if(OUT.find(function(o){return o.id===v.videoId;})){skip++;continue;}


try{var r=await aj('/api/v1/videos/'+v.videoId);var d=r.d,inst=r.i;
var th=(d.videoThumbnails||[]);th=th.find(function(t){return t.quality==='medium';});if(!th&&d.videoThumbnails)th=d.videoThumbnails[0];th=th?th.url:'';
var r2=await aj('/api/v1/captions/'+v.videoId);
var tracks=(r2.d.captions||[]).map(function(c){return{label:c.label,url:c.url.indexOf('http')===0?c.url:inst+c.url};});
if(!tracks.length)throw new Error('no');
tracks.sort(function(a,b){return(/auto/i.test(a.label)?1:0)-(/auto/i.test(b.label)?1:0);});
var raw=await at(tracks[0].url),cues=pv(raw);
if(!cues.length)throw new Error('empty');
OUT.push({id:v.videoId,title:d.title||'Untitled',thumb:th.indexOf('http')===0?th:inst+th,cues:cues,words:wc(gt(cues))});
render(OUT[OUT.length-1]);ok++;
}catch(e){fail++;}
if(x<selVids.length-1&&!CH.abort.signal.aborted)await new Promise(function(r){setTimeout(r,650);});
}
